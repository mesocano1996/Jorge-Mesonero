version: "3.9"

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: backend-api
    ports:
      - "5001:5001"

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.front
    container_name: frontend-app
    ports:
      - "5000:5000"
    depends_on:
      - backend
    environment:
      - API_URL=http://backend:5001
