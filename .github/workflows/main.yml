name: Debug test

on: [push, pull_request]

jobs:
  debug:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: List ALL files
      run: find . -type f | head -20
    
    - name: List test files
      run: find test/ -name "*.py" || echo "test/ NO encontrado"
    
    - name: Python deps
      run: pip install flask pytest
    
    - name: Collect tests
      run: pytest --collect-only -q || echo "pytest OK pero sin tests"
    
    - name: Run tests anyway
      run: pytest test/ -v --tb=no || echo "Tests ejecutados (algunos fallaron OK)"
      continue-on-error: true
