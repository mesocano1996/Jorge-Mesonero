{% extends "base.html" %}
{% block title %}Registro - Colegio Central{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card shadow">
            <div class="card-body p-4">
                <h3 class="text-center mb-4">📝 Registro de Alumno</h3>
                <form method="POST">
                    <div class="mb-3">
                        <label class="form-label">Email</label>
                        <input type="email" class="form-control" name="email" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Contraseña</label>
                        <input type="password" class="form-control" name="password" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Nombre del colegio</label>
                        <input type="text" class="form-control" name="nombre_colegio" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Nombre del alumno</label>
                        <input type="text" class="form-control" name="nombre_alumno" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Curso</label>
                        <input type="text" class="form-control" name="curso" required>
                    </div>
                    <button type="submit" class="btn btn-success w-100">Crear cuenta</button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
